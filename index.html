<!DOCTYPE html>
<html lang="zh-cn">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" href="./starmap-icon_256.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Starmap</title>
        <style>
            #app > .loadding {
                width: 80px;
                height: 80px;
                font-size: 80px;
                opacity: 0.5;
                position: fixed;
                left: 0;
                right: 0;
                margin: auto;
                top: 0;
                bottom: 0;
                animation: starmap_loadding 1s infinite;
            }
            #app > .loadding .loading-logo {
            }
            @keyframes starmap_loadding {
                0% {
                    opacity: 0.4;
                }
                50% {
                    opacity: 0.9;
                }
                100% {
                    opacity: 0.4;
                }
            }
        </style>
    </head>
    <body>
        <div id="app">
            <div class="loadding"><img class="loading-logo" src="./starmap-logo-2_512w.png" width="128px" /></div>
        </div>
        <script type="module" src="./index.ts"></script>
    </body>
</html>
